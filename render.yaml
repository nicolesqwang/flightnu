databases:
  - name: flightnu-db
    databaseName: flightnu
    user: flightnu
    plan: free

services:
  # FastAPI REST API
  - type: web
    name: flightnu-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flightnu-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://flightnu-web.onrender.com
      - key: INGESTION_INTERVAL_HOURS
        value: "4"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false

  # Background worker: runs the 4-hour price ingestion / analytics / alert cycle
  - type: worker
    name: flightnu-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flightnu-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: INGESTION_INTERVAL_HOURS
        value: "4"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALERT_FROM_EMAIL
        sync: false

  # Next.js frontend
  - type: web
    name: flightnu-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://flightnu-api.onrender.com
